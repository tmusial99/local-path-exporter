apiVersion: v1
kind: Pod
metadata:
  name: {{ include "local-path-exporter.fullname" . }}-connection-test
  labels:
    {{- include "local-path-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  containers:
  - name: curl
    image: curlimages/curl:8.11.0
    imagePullPolicy: IfNotPresent
    command:
    - sh
    - -c
    - |
      set -e
      echo "Testing connection to local-path-exporter metrics endpoint..."
      curl -f -s "http://{{ include "local-path-exporter.fullname" . }}:{{ .Values.service.port }}/metrics" > /dev/null
      echo "Connection test passed!"
  restartPolicy: Never
