name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          working-directory: app

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: app/go.mod
          work-dir: app
          repo-checkout: false

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/local-path-exporter

      - name: helm template (default values)
        run: helm template t charts/local-path-exporter >/dev/null

      - name: helm template (ServiceMonitor enabled)
        run: helm template t charts/local-path-exporter --set serviceMonitor.enabled=true >/dev/null
